apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frpc.fullname" . }}
  labels:
    {{- include "frpc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "frpc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pods when the ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "frpc.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frpc
          image: "{{ .Values.image.repository }}:{{ include "frpc.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - frpc
          args:
            - -c
            - /etc/frpc/frpc.toml
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: frpc-config
              mountPath: /etc/frpc
              readOnly: true
            - name: frpc-secret
              mountPath: /etc/frpc-secret
              readOnly: true
      volumes:
        - name: frpc-config
          configMap:
            name: {{ include "frpc.fullname" . }}
        - name: frpc-secret
          secret:
            secretName: {{ include "frpc.secretName" . }}
            items:
              - key: {{ .Values.frpc.existingSecretKey }}
                path: {{ .Values.frpc.existingSecretKey }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
